services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/ksef-system
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./Frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
